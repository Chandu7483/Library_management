<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Library Management</title>

    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container-fluid p-0">

        <!-- HERO SECTION -->
        <div class="hero-section">
            <div class="overlay">
                <h1 class="hero-heading">Library Management</h1>
                <p class="hero-subtitle">Discover millions of books instantly</p>

                <div class="search-box">
                    <input id="searchInput" type="search"
                        placeholder="Search for books..." />
                    <button id="searchBtn">Search</button>
                </div>
            </div>
        </div>

        <!-- LOADING + MESSAGE -->
        <div class="text-center mt-4">
            <div id="spinner" class="d-none spinner-border text-dark"
                role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p id="message" class="mt-2"></p>
        </div>

        <!-- SEARCH RESULTS -->
        <div id="searchResults" class="container mt-4"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
